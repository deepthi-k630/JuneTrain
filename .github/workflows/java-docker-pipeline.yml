name: Build and Push to Docker Hub

on:
  push:
    branches: [ main ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/javawebserver:latest ./JavaDocker

    - name: Push to Docker Hub
      run: docker push ${{ secrets.DOCKER_USERNAME }}/javawebserver:latest

    - name: Run Docker container on port 8080
      run: docker run -d -p 8080:8080 --name javawebserver ${{ secrets.DOCKER_USERNAME }}/javawebserver:latest

    - name: Show running containers
      run: docker ps
