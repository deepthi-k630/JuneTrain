name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push Java Docker Image
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./JavaDocker
          dockerfile: ./JavaDocker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/Java-Docker:latest
            ${{ secrets.DOCKER_USERNAME }}/Java-Docker:${{ github.run_number }}

      - name: Run Docker container on port 8080
        run: docker run -d -p 8080:8080 --name javawebserver ${{ secrets.DOCKER_USERNAME }}/Java-Docker:latest

      - name: Show running containers
        run: docker ps
